<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐台 | 回忆收藏馆</title>
  <meta name="description" content="音乐是记忆的载体，听到某首歌，就会想起某个人">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style id="page-styles">
    .music-layout {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: var(--spacing-2xl);
      align-items: start;
    }

    @media (max-width: 991px) {
      .music-layout {
        grid-template-columns: 1fr;
      }
    }

    .now-playing {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--spacing-2xl);
      text-align: center;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--color-border);
      position: sticky;
      top: calc(var(--nav-height) + var(--spacing-xl));
    }

    .now-playing__cover {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      margin: 0 auto var(--spacing-xl);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    .now-playing__cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .now-playing.playing .now-playing__cover img {
      animation: spin 20s linear infinite;
    }

    .now-playing__cover::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: var(--color-bg);
      border-radius: 50%;
      border: 4px solid var(--color-primary-light);
    }

    .now-playing__title {
      font-size: var(--font-size-2xl);
      font-family: var(--font-display);
      margin-bottom: var(--spacing-xs);
      color: var(--color-text-primary);
    }

    .now-playing__artist {
      color: var(--color-text-muted);
      margin-bottom: var(--spacing-xl);
    }

    .now-playing__progress {
      margin-bottom: var(--spacing-lg);
    }

    .now-playing__progress-bar {
      height: 6px;
      background: var(--color-secondary);
      border-radius: var(--radius-full);
      cursor: pointer;
      overflow: hidden;
    }

    .now-playing__progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      border-radius: var(--radius-full);
      width: 0%;
      transition: width 0.1s linear;
    }

    .now-playing__time {
      display: flex;
      justify-content: space-between;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      margin-top: 6px;
    }

    .now-playing__controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-lg);
    }

    .now-playing__btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      transition: all var(--transition-base);
      border: none;
      background: var(--color-secondary);
      cursor: pointer;
      font-size: var(--font-size-lg);
    }

    .now-playing__btn:hover {
      background: var(--color-primary-light);
      color: var(--color-primary-dark);
    }

    .now-playing__btn--play {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      color: white;
      font-size: var(--font-size-2xl);
    }

    .now-playing__btn--play:hover {
      background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary));
      color: white;
      transform: scale(1.05);
    }

    .playlist-section {
      background: var(--color-bg-card);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
    }

    .playlist-section__title {
      font-size: var(--font-size-xl);
      font-family: var(--font-display);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
    }

    .playlist {
      max-height: 500px;
      overflow-y: auto;
    }

    .song-item__index {
      width: 24px;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      text-align: center;
      flex-shrink: 0;
    }

    .song-item.playing .song-item__index {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">回忆收藏馆</a>
        <div class="navbar__menu">
          <a href="index.html" class="navbar__link">首页</a>
          <a href="quotes.html" class="navbar__link">文案馆</a>
          <a href="memories.html" class="navbar__link">回忆墙</a>
          <a href="gallery.html" class="navbar__link">相册</a>
          <a href="music.html" class="navbar__link active">音乐台</a>
          <a href="videos.html" class="navbar__link">视频集</a>
        </div>
        <button class="navbar__toggle" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <main id="main-content" class="main-content">
      <div class="container">
        <header class="page-header animate-on-scroll">
          <h1 class="page-title">音乐台</h1>
          <p class="page-subtitle">音乐是记忆的载体，听到某首歌，就会想起某个人</p>
        </header>

        <div class="music-layout">
          <div class="now-playing animate-on-scroll" id="now-playing">
            <div class="now-playing__cover">
              <img src="" alt="专辑封面" id="np-cover">
            </div>
            <h2 class="now-playing__title" id="np-title">选择一首歌</h2>
            <p class="now-playing__artist" id="np-artist">点击歌单开始播放</p>
            <div class="now-playing__progress">
              <div class="now-playing__progress-bar" id="np-progress-bar">
                <div class="now-playing__progress-fill" id="np-progress-fill"></div>
              </div>
              <div class="now-playing__time">
                <span id="np-current">0:00</span>
                <span id="np-total">0:00</span>
              </div>
            </div>
            <div class="now-playing__controls">
              <button class="now-playing__btn" id="np-prev" aria-label="上一首">&#9194;</button>
              <button class="now-playing__btn now-playing__btn--play" id="np-play" aria-label="播放">&#9654;</button>
              <button class="now-playing__btn" id="np-next" aria-label="下一首">&#9193;</button>
            </div>
          </div>

          <div class="playlist-section animate-on-scroll delay-200">
            <h3 class="playlist-section__title">📋 我的歌单</h3>
            <div class="playlist" id="playlist">
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>用心记录，用爱收藏 <span class="footer__heart">❤</span></p>
        <p style="margin-top: var(--spacing-sm);">© 2024 回忆收藏馆 · 珍藏每一份美好</p>
      </div>
    </footer>

    <button class="back-to-top" aria-label="回到顶部">↑</button>

    <div class="player">
      <div class="player__inner">
        <div class="player__cover">
          <img src="" alt="歌曲封面">
        </div>
        <div class="player__info">
          <div class="player__title">暂无播放</div>
          <div class="player__artist">--</div>
        </div>
        <div class="player__progress">
          <div class="player__progress-bar">
            <div class="player__progress-fill"></div>
          </div>
          <div class="player__time">
            <span class="player__current-time">0:00</span>
            <span class="player__total-time">0:00</span>
          </div>
        </div>
        <div class="player__controls">
          <button class="player__btn player__btn--prev" aria-label="上一首"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
          <button class="player__btn player__btn--play" aria-label="播放"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
          <button class="player__btn player__btn--next" aria-label="下一首"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>
        <div class="player__volume">
          <span class="player__volume-icon">&#128266;</span>
          <input type="range" class="player__volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils/data-loader.js"></script>
  <script src="js/utils/scroll-animation.js"></script>
  <script src="js/player.js"></script>
  <script src="js/main.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/memories.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/music.js"></script>
  <script src="js/videos.js"></script>
</body>
</html>
