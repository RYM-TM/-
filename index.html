<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回忆收藏馆 | 小敏同学和小铭同学</title>
  <meta name="description" content="我们的一切">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style id="page-styles">
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .page-wrapper {
      padding-bottom: 0;
      height: 100vh;
    }

    .main-content {
      padding-top: 0;
      padding-bottom: 0;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      position: relative;
      width: 100%;
      height: calc(100vh - var(--nav-height) - var(--player-height));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-lg);
      overflow: hidden;
    }

    .hero__bg {
      position: relative;
      flex: 1;
      width: 100%;
      max-width: 600px;
      background-color: transparent;
      background-image: url('assets/images/hero-bg.webp');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      min-height: 0;
    }

    .hero__overlay {
      display: none;
    }

    .hero__content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 700px;
      padding: 0 var(--container-padding);
      padding-bottom: var(--spacing-xl);
    }

    .hero__title {
      font-size: var(--font-size-5xl);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-xl);
      opacity: 0;
      animation: fadeInUp 1s ease 0.3s forwards;
      line-height: 1.4;
      text-shadow: 0 2px 20px rgba(255, 255, 255, 0.5);
    }

    .hero__text {
      font-size: var(--font-size-xl);
      color: var(--color-text-secondary);
      line-height: 2.2;
      opacity: 0;
      animation: fadeInUp 1s ease 0.6s forwards;
      font-weight: 400;
    }

    .hero__decoration {
      display: none;
    }

    .footer {
      display: none;
    }

    .back-to-top {
      display: none;
    }

    @media (max-width: 768px) {
      .hero__title {
        font-size: var(--font-size-4xl);
      }

      .hero__text {
        font-size: var(--font-size-lg);
      }

      .hero__decoration {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">回忆收藏馆</a>
        <div class="navbar__menu">
          <a href="index.html" class="navbar__link active">首页</a>
          <a href="quotes.html" class="navbar__link">文案馆</a>
          <a href="memories.html" class="navbar__link">回忆墙</a>
          <a href="gallery.html" class="navbar__link">相册</a>
          <a href="music.html" class="navbar__link">音乐台</a>
          <a href="videos.html" class="navbar__link">视频集</a>
        </div>
        <button class="navbar__toggle" aria-label="菜单">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <main id="main-content" class="main-content">
      <section class="hero">
        <div class="hero__bg"></div>
        <div class="hero__overlay"></div>
        <span class="hero__decoration hero__decoration--left">❀</span>
        <span class="hero__decoration hero__decoration--right">✿</span>
        <div class="hero__content">
          <h1 class="hero__title">愿所有美好<br>都被温柔收藏</h1>
          <p class="hero__text">
            我们解决问题 而非问题解决我们<br>所爱隔山海 山海亦可平
          </p>
        </div>
      </section>
    </main>

    <div class="player">
      <div class="player__inner">
        <div class="player__cover">
          <img src="" alt="歌曲封面">
        </div>
        <div class="player__info">
          <div class="player__title">暂无播放</div>
          <div class="player__artist">--</div>
        </div>
        <div class="player__progress">
          <div class="player__progress-bar">
            <div class="player__progress-fill"></div>
          </div>
          <div class="player__time">
            <span class="player__current-time">0:00</span>
            <span class="player__total-time">0:00</span>
          </div>
        </div>
        <div class="player__controls">
          <button class="player__btn player__btn--prev" aria-label="上一首">&#9194;</button>
          <button class="player__btn player__btn--play" aria-label="播放">&#9654;</button>
          <button class="player__btn player__btn--next" aria-label="下一首">&#9193;</button>
        </div>
        <div class="player__volume">
          <span class="player__volume-icon">&#128266;</span>
          <input type="range" class="player__volume-slider" min="0" max="1" step="0.01" value="0.7">
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils/data-loader.js"></script>
  <script src="js/utils/scroll-animation.js"></script>
  <script src="js/player.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
